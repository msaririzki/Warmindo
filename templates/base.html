<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}WARMINDO - Mie Instan & Nasi Enak, Harga Bersahabat{% endblock %}" />
  <title>{% block title %}WARMINDO{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#fff5f0', 100:'#ffe4d5', 200:'#ffc4a3', 300:'#ff9a6c', 400:'#ff6b35', 500:'#e84a0c', 600:'#c73d08', 700:'#a33007', 800:'#82250a', 900:'#6b1f0b' },
            warm:    { 50:'#fffbf5', 100:'#fef3e2', 200:'#fde5be', 300:'#fbd195', 400:'#f9b762', 500:'#f79b2c', 600:'#e07e12', 700:'#bc620e', 800:'#974e12', 900:'#7b4013' },
            cream: '#FDF8F0',
            charcoal: '#2C2C2C',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          animation: {
            'slide-in-bottom': 'slideInBottom 0.3s ease-out',
            'fade-in': 'fadeIn 0.2s ease-out',
            'bounce-soft': 'bounceSoft 0.5s ease',
            'pulse-soft': 'pulseSoft 2s infinite',
          },
          keyframes: {
            slideInBottom: { from:{ transform:'translateY(100%)', opacity:'0' }, to:{ transform:'translateY(0)', opacity:'1' } },
            fadeIn:        { from:{ opacity:'0' }, to:{ opacity:'1' } },
            bounceSoft:    { '0%,100%':{ transform:'scale(1)' }, '50%':{ transform:'scale(1.1)' } },
            pulseSoft:     { '0%,100%':{ opacity:'1' }, '50%':{ opacity:'0.7' } },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-cream font-sans text-charcoal">

  {% block navbar %}{% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block footer %}{% endblock %}

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- Global Scripts -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
